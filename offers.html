<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>العروض الحالية | مركز الأمجاد</title>
<style>
:root {
--blue: #0f5bb7;
--blue-dark: #0b3f86;
--text: #333333;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: Tahoma, Arial, sans-serif;
background: radial-gradient(circle at top, #eef5ff 0%, #f8fbff 40%, #f5f7fa 100%);
color: var(--text);
min-height: 100vh;
line-height: 1.6;
}

header {
background: linear-gradient(135deg, #0f5bb7 0%, #1762c6 100%);
color: white;
text-align: center;
padding: 60px 20px 40px;
border-bottom-left-radius: 40px;
border-bottom-right-radius: 40px;
box-shadow: 0 10px 30px rgba(15, 91, 183, 0.15);
position: relative;
}

.back-btn {
position: absolute;
top: 20px;
right: 20px;
background: rgba(255,255,255,0.2);
color: white;
text-decoration: none;
padding: 8px 16px;
border-radius: 20px;
font-size: 0.9rem;
font-weight: bold;
transition: background 0.3s ease;
display: flex;
align-items: center;
gap: 5px;
}

.back-btn:hover { background: rgba(255,255,255,0.3); }

header h1 { font-size: clamp(1.8rem, 4vw, 2.5rem); margin-bottom: 10px; }

/* شبكة العروض */
.offers-grid {
max-width: 1100px;
margin: 50px auto;
padding: 0 20px;
display: grid;
/* ضبط ذكي ليتناسب مع الصور الطولية 1080×1350 */
grid-template-columns: repeat(auto-fit, minmax(min(320px, 100%), 1fr));
gap: 35px;
}

.offer-card {
background: white;
border-radius: 28px;
overflow: hidden;
box-shadow: 0 20px 40px rgba(15,91,183,0.08);
border: 1px solid rgba(15,91,183,0.08);
transition: transform 0.3s ease, box-shadow 0.3s ease;
animation: fadeUp 0.6s ease both;
}

.offer-card:hover {
transform: translateY(-10px);
box-shadow: 0 30px 55px rgba(15,91,183,0.14);
}

.offer-card img {
width: 100%;
height: auto;
display: block;
}

.status-message {
text-align: center;
margin: 60px auto;
font-size: 1.2rem;
color: var(--blue-dark);
font-weight: bold;
}

.loader {
border: 4px solid rgba(15,91,183,0.1);
border-top: 4px solid var(--blue);
border-radius: 50%;
width: 40px;
height: 40px;
animation: spin 1s linear infinite;
margin: 0 auto 15px;
}

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

footer {
background: rgba(15, 91, 183, 0.95);
color: white;
text-align: center;
padding: 25px 20px;
margin-top: 60px;
font-size: 0.95rem;
}
</style>
</head>
<body>

<header>
<a href="index.html" class="back-btn"><span>&rarr;</span> العودة للرئيسية</a>
<h1>العروض الحالية</h1>
<p style="color: rgba(255,255,255,0.9);">اكتشف أحدث البرامج والخصومات المتاحة حالياً</p>
</header>

<div id="status-container" class="status-message">
<div class="loader"></div>
<p>جاري البحث عن أحدث العروض...</p>
</div>

<!-- هنا سيتم إضافة الصور آلياً بواسطة الجافاسكربت -->
<div id="offers-grid" class="offers-grid"></div>

<footer>
<p>جميع الحقوق محفوظة © 2026 | تصميم وتطوير: يحيى المريسي</p>
</footer>

<script>
// الكود الذكي لجلب العروض من المجلد تلقائياً
const grid = document.getElementById('offers-grid');
const statusContainer = document.getElementById('status-container');
let currentIndex = 1; // نبدأ بالملف 1.svg
let foundAnyOffer = false;

function loadNextOffer() {
    const img = new Image();
    
    // محاولة تحميل الصورة ذات الرقم الحالي
    img.src = `offers/${currentIndex}.svg`;
    
    // إذا نجح تحميل الصورة (الرقم موجود)
    img.onload = function() {
        foundAnyOffer = true;
        statusContainer.style.display = 'none'; // إخفاء علامة التحميل
        
        // إنشاء كرت العرض وإضافته للشبكة
        const card = document.createElement('div');
        card.className = 'offer-card';
        card.appendChild(img);
        grid.appendChild(card);
        
        // الانتقال للرقم التالي ومحاولة تحميله
        currentIndex++;
        loadNextOffer();
    };
    
    // إذا فشل التحميل (بمعنى أننا وصلنا لنهاية الملفات المتاحة)
    img.onerror = function() {
        // إذا لم يجد أي عرض (حتى العرض الأول غير موجود)
        if (!foundAnyOffer && currentIndex === 1) {
            statusContainer.innerHTML = '<p>لا توجد عروض متاحة في الوقت الحالي، ترقبونا قريباً!</p>';
        } else {
            // توقف عن البحث بعد اكتمال العروض
            statusContainer.style.display = 'none';
        }
    };
}

// تشغيل الدالة لتبدأ البحث
window.onload = loadNextOffer;
</script>

</body>
</html>
