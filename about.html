<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هويتنا التعليمية | مركز الأمجاد</title>
<style>
:root {
--blue: #0f5bb7;
--blue-dark: #0b3f86;
--yellow: #fbe03f;
--white: #ffffff;
--text: #333333;
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: Tahoma, Arial, sans-serif;
background: radial-gradient(circle at top, #eef5ff 0%, #f8fbff 40%, #f5f7fa 100%);
color: var(--text);
min-height: 100vh;
line-height: 1.6;
}

header {
background: linear-gradient(135deg, #0f5bb7 0%, #1762c6 100%);
color: white;
text-align: center;
padding: 60px 20px 40px;
border-bottom-left-radius: 40px;
border-bottom-right-radius: 40px;
box-shadow: 0 10px 30px rgba(15, 91, 183, 0.15);
position: relative;
}

.back-btn {
position: absolute;
top: 20px;
right: 20px;
background: rgba(255,255,255,0.2);
color: white;
text-decoration: none;
padding: 8px 16px;
border-radius: 20px;
font-size: 0.9rem;
font-weight: bold;
transition: background 0.3s ease;
display: flex;
align-items: center;
gap: 5px;
}

.back-btn:hover {
background: rgba(255,255,255,0.3);
}

header h1 {
font-size: clamp(1.8rem, 4vw, 2.5rem);
margin-bottom: 10px;
}

.content-container {
max-width: 1000px;
margin: 50px auto;
padding: 0 20px;
display: grid;
grid-template-columns: repeat(auto-fit, minmax(min(300px, 100%), 1fr));
gap: 40px;
}

.svg-box {
background: white;
border-radius: 28px;
padding: 40px 20px;
text-align: center;
box-shadow: 0 20px 40px rgba(15,91,183,0.08);
border: 1px solid rgba(15,91,183,0.08);
transition: transform 0.3s ease;
animation: fadeUp 0.6s ease both;
}

.svg-box:nth-child(2) {
animation-delay: 0.2s;
}

.svg-box:hover {
transform: translateY(-8px);
box-shadow: 0 30px 55px rgba(15,91,183,0.12);
}

.svg-box img {
max-width: 100%;
height: auto;
max-height: 280px; 
margin: 0 auto;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

footer {
background: rgba(15, 91, 183, 0.95);
color: white;
text-align: center;
padding: 25px 20px;
margin-top: 60px;
font-size: 0.95rem;
}
</style>
</head>
<body>

<header>
<a href="index.html" class="back-btn">
    <span>&rarr;</span> العودة للرئيسية
</a>
<h1>هويتنا التعليمية</h1>
<p style="color: rgba(255,255,255,0.9);">الرؤية والرسالة التي نرتكز عليها في مركز الأمجاد</p>
</header>

<div class="content-container">
<!-- الرؤية -->
<div class="svg-box">
<img src="R.svg" alt="رؤية مركز الأمجاد">
</div>

<!-- الرسالة -->
<div class="svg-box">
<img src="O.svg" alt="رسالة مركز الأمجاد">
</div>
</div>

<footer>
<p>جميع الحقوق محفوظة © 2026 | تصميم وتطوير: يحيى المريسي</p>
</footer>

</body>
</html>
